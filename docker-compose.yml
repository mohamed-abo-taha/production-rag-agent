# Optional: run the agent against a real Qdrant server instead of the local on-disk store.
# `docker compose up` brings up Qdrant + the API together.
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - qdrant

volumes:
  qdrant_data:
